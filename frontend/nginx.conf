server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — every route serves the same index.html so client routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Vite emits hashed filenames under /assets — they're safe to cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # gzip the small text assets nginx already has loaded.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
