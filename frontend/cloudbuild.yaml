# Cloud Build pipeline for the frontend.
# Builds the Vite bundle and deploys it to Firebase Hosting (site:
# chess-review-monte). Wired up by a Cloud Build trigger that fires on pushes
# to `main` when files under `frontend/**`, `firebase.json`, or `.firebaserc`
# change.

substitutions:
  _PROJECT: chess-engine-monte

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Install deps + build the Vite bundle into frontend/dist.
  - id: build
    name: node:20-slim
    entrypoint: bash
    dir: frontend
    args:
      - -c
      - |
        set -eu
        npm ci || npm install
        npm run build

  # Deploy to Firebase Hosting. The Firebase CLI authenticates via Application
  # Default Credentials, which Cloud Build provides automatically — the
  # ${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com service account has
  # roles/firebasehosting.admin.
  - id: deploy
    name: node:20-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -eu
        npm install -g firebase-tools
        firebase deploy --only hosting --project ${_PROJECT} --non-interactive
