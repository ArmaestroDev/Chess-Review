<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ChessReview — Game analysis</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #f5f1e8;
  --bg-2: #efe9dc;
  --surface: #fdfbf5;
  --surface-2: #f7f1e3;
  --line: rgba(60, 50, 35, 0.10);
  --line-2: rgba(60, 50, 35, 0.18);
  --ink: #1d1a14;
  --ink-2: #3c3527;
  --ink-3: #6b6253;
  --ink-4: #9b9486;
  --accent: #b8862b;
  --accent-soft: rgba(184, 134, 43, 0.14);
  --accent-ink: #6b4d10;
  --pos: #3a7d3a;
  --neg: #b54632;
  --shadow-sm: 0 1px 2px rgba(40, 30, 15, 0.04), 0 0 0 0.5px rgba(40, 30, 15, 0.05);
  --shadow-md: 0 1px 2px rgba(40, 30, 15, 0.04), 0 4px 16px rgba(40, 30, 15, 0.06), 0 0 0 0.5px rgba(40, 30, 15, 0.06);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  -webkit-font-smoothing: antialiased;
}
.mono, code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'zero', 'ss02'; }

button { font: inherit; color: inherit; cursor: pointer; }

/* ─── App shell ──────────────────────────────────────────────── */
.cr-app { min-height: 100vh; display: flex; flex-direction: column;
  background:
    radial-gradient(1200px 600px at 80% -200px, rgba(184, 134, 43, 0.06), transparent 60%),
    radial-gradient(800px 400px at 0% 100%, rgba(60, 50, 35, 0.04), transparent 60%),
    var(--bg);
}

/* ─── Header ─────────────────────────────────────────────────── */
.cr-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  padding: 14px 28px; border-bottom: 0.5px solid var(--line);
  background: rgba(253, 251, 245, 0.6); backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 10;
}
.cr-brand { display: flex; align-items: center; gap: 10px; }
.cr-logo { width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(180deg, #2a2418, #1d1a14);
  color: #d8b56a;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 1px 0 rgba(255, 220, 150, 0.18), 0 1px 2px rgba(0, 0, 0, 0.18);
}
.cr-brand-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; letter-spacing: -0.01em; line-height: 1; }
.cr-brand-sub { font-size: 10.5px; color: var(--ink-3); margin-top: 3px; letter-spacing: 0.02em; }

.cr-nav { display: flex; gap: 4px; padding: 3px; background: rgba(60, 50, 35, 0.05);
  border-radius: 999px; border: 0.5px solid var(--line); }
.cr-nav a { padding: 7px 16px; font-size: 12.5px; font-weight: 500; color: var(--ink-3);
  border-radius: 999px; cursor: pointer; user-select: none; transition: all .15s; }
.cr-nav a:hover { color: var(--ink); }
.cr-nav a.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

.cr-actions { display: flex; gap: 8px; align-items: center; justify-self: end; }
.cr-icon-btn { width: 32px; height: 32px; border-radius: 8px;
  border: 0.5px solid var(--line); background: var(--surface); color: var(--ink-2);
  display: inline-flex; align-items: center; justify-content: center; transition: all .15s; }
.cr-icon-btn.sm { width: 24px; height: 24px; border-radius: 6px; }
.cr-icon-btn:hover { background: var(--surface-2); color: var(--ink); }
.cr-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #c9a961, #8a6a2b);
  color: #fdfbf5; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; box-shadow: var(--shadow-sm); }

/* ─── Main 3-column grid ────────────────────────────────────── */
.cr-main { display: grid; grid-template-columns: 320px minmax(0, 1fr) 360px;
  gap: 20px; padding: 20px 28px 28px; max-width: 1600px; margin: 0 auto; width: 100%;
  align-items: start;
}

/* ─── Card primitive ────────────────────────────────────────── */
.cr-card { background: var(--surface); border: 0.5px solid var(--line);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
.cr-card-hd { display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px 10px; }
.cr-card-title { font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-3); }
.cr-card-actions { display: flex; gap: 6px; }
.cr-pill { font-size: 10.5px; font-weight: 500; color: var(--ink-3);
  background: rgba(60, 50, 35, 0.06); padding: 3px 8px; border-radius: 999px; letter-spacing: 0.02em; }
.cr-pill.mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.cr-chip { font-size: 10.5px; padding: 3px 8px; border-radius: 999px;
  background: rgba(60, 50, 35, 0.06); border: 0; color: var(--ink-2); font-weight: 500; }
.cr-chip:hover { background: rgba(60, 50, 35, 0.10); }

/* ─── Left: game meta ───────────────────────────────────────── */
.cr-game-meta { padding: 16px; }
.cr-game-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; line-height: 1.2; letter-spacing: -0.01em; }
.cr-game-sub { font-size: 11px; color: var(--ink-3); margin-top: 4px; letter-spacing: 0.01em; }
.cr-game-players { margin-top: 14px; padding: 12px; border-radius: var(--radius); background: var(--bg-2);
  display: flex; flex-direction: column; gap: 8px; }
.cr-player { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.cr-pdot { width: 10px; height: 10px; border-radius: 50%;
  border: 1px solid rgba(60, 50, 35, 0.4); }
.cr-pdot.w { background: #fdfbf5; }
.cr-pdot.b { background: #1d1a14; border-color: #1d1a14; }
.cr-pname { flex: 1; font-weight: 500; color: var(--ink); }
.cr-prating { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); }
.cr-vs { font-size: 9.5px; color: var(--ink-4); letter-spacing: 0.1em; text-transform: uppercase; align-self: center; padding: 0 4px; }
.cr-game-result { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
.cr-result-pill { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px;
  padding: 4px 10px; border-radius: 6px; }
.cr-result-pill.won { background: rgba(58, 125, 58, 0.12); color: #2e6a2e; }
.cr-result-by { font-size: 11px; color: var(--ink-3); }

/* ─── Moves list ────────────────────────────────────────────── */
.cr-moves-card { display: flex; flex-direction: column; max-height: calc(100vh - 320px); }
.cr-moves { flex: 1; overflow-y: auto; padding: 4px 12px 12px;
  scrollbar-width: thin; scrollbar-color: rgba(60, 50, 35, 0.18) transparent; }
.cr-moves::-webkit-scrollbar { width: 6px; }
.cr-moves::-webkit-scrollbar-thumb { background: rgba(60, 50, 35, 0.18); border-radius: 3px; }
.cr-move-row { display: grid; grid-template-columns: 28px 1fr 1fr; gap: 4px; align-items: center;
  padding: 1px 0; }
.cr-move-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-4); text-align: right; padding-right: 4px; }
.cr-move-cell { display: flex; align-items: center; justify-content: space-between; gap: 6px;
  padding: 5px 8px; border-radius: 6px; border: 0.5px solid transparent;
  background: transparent; color: var(--ink); text-align: left; }
.cr-move-cell.empty { color: var(--ink-4); justify-content: flex-start; padding-left: 8px; }
.cr-move-cell:hover:not(.empty) { background: rgba(60, 50, 35, 0.05); }
.cr-move-cell.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-ink); font-weight: 600; }
.cr-move-san { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; }
.cr-move-cell.active .cr-move-san { font-weight: 600; }
.cr-move-glyph { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
  padding: 1px 4px; border-radius: 4px; min-width: 16px; text-align: center; line-height: 1.4; }

.cr-controls { display: flex; align-items: center; gap: 4px; padding: 10px 12px; border-top: 0.5px solid var(--line); background: var(--surface-2); }
.cr-ctrl { width: 30px; height: 30px; border-radius: 7px; border: 0.5px solid transparent;
  background: transparent; color: var(--ink-2); display: inline-flex; align-items: center; justify-content: center; }
.cr-ctrl:hover { background: var(--surface); border-color: var(--line); }
.cr-ctrl.on { background: var(--accent-soft); color: var(--accent-ink); border-color: var(--accent); }
.cr-ctrl-play { background: var(--ink); color: #fdfbf5; }
.cr-ctrl-play:hover { background: var(--ink-2); border-color: transparent; color: #fdfbf5; }
.cr-ctrl-play.on { background: var(--accent); color: #fdfbf5; }
.cr-ctrl-spacer { flex: 1; }

/* ─── Center: board ─────────────────────────────────────────── */
.cr-center { display: flex; flex-direction: column; gap: 10px; align-items: stretch; }
.cr-board-head, .cr-board-foot { width: 100%; }
.cr-pstrip { display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--surface); border-radius: var(--radius);
  border: 0.5px solid var(--line); transition: all .2s; box-shadow: var(--shadow-sm); }
.cr-pstrip.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-sm); }
.cr-pstrip-l { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
.cr-pavatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; flex-shrink: 0; border: 0.5px solid var(--line-2); }
.cr-pavatar.w { background: #fdfbf5; color: #1d1a14; }
.cr-pavatar.b { background: #1d1a14; color: #fdfbf5; }
.cr-pstrip-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.cr-pstrip-name { font-size: 13px; font-weight: 600; }
.cr-pstrip-rating { font-family: 'JetBrains Mono', monospace; font-weight: 400; color: var(--ink-3); font-size: 11px; margin-left: 4px; }
.cr-pstrip-cap { display: flex; align-items: center; gap: 1px; height: 18px; }
.cr-cap-pc { display: inline-block; margin-right: -4px; }
.cr-cap-diff { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--pos); margin-left: 8px; font-weight: 500; }
.cr-clock { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: var(--ink-3);
  padding: 5px 10px; border-radius: 6px; background: var(--bg-2); letter-spacing: 0.02em; }
.cr-clock.active { color: var(--ink); background: var(--accent-soft); }

.cr-board-wrap { display: grid; grid-template-columns: 22px 1fr; gap: 10px; align-items: stretch;
  position: relative; }

/* Eval bar */
.cr-eval { position: relative; display: flex; flex-direction: column; }
.cr-eval-track { flex: 1; width: 22px; border-radius: 6px; overflow: hidden;
  background: #1d1a14; position: relative; box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.3), var(--shadow-sm);
  display: flex; flex-direction: column-reverse; }
.cr-eval-white { background: linear-gradient(180deg, #fdfbf5, #ede5d0); transition: height .35s cubic-bezier(.2,.8,.2,1); }
.cr-eval-mid { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: rgba(184, 134, 43, 0.6); pointer-events: none; }
.cr-eval-num { position: absolute; left: 50%; transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600; padding: 1px 0; width: 100%; text-align: center; }
.cr-eval-num.bot { bottom: 4px; color: #1d1a14; }
.cr-eval-num.top { top: 4px; color: #fdfbf5; }

/* Board */
.cr-board-frame { position: relative; aspect-ratio: 1; background: var(--surface);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 1px 0 rgba(255,255,255,.5) inset, 0 8px 30px rgba(40, 30, 15, 0.10), 0 0 0 0.5px var(--line-2); }
.cr-board { display: grid; grid-template-rows: repeat(8, 1fr); width: 100%; height: 100%; }
.cr-rank { display: grid; grid-template-columns: repeat(8, 1fr); }
.cr-sq { position: relative; display: flex; align-items: center; justify-content: center; }
.cr-sq.lt { background: var(--light); }
.cr-sq.dk { background: var(--dark); }
.cr-sq svg { width: 78%; height: 78%; }
.cr-sq.hl-from { box-shadow: inset 0 0 0 9999px rgba(184, 134, 43, 0.32); }
.cr-sq.hl-to { box-shadow: inset 0 0 0 9999px rgba(184, 134, 43, 0.42); }
.cr-coord { position: absolute; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
  opacity: 0.6; pointer-events: none; }
.cr-sq.lt .cr-coord { color: var(--dark); }
.cr-sq.dk .cr-coord { color: var(--light); }
.cr-rk { top: 3px; left: 4px; }
.cr-fl { bottom: 2px; right: 5px; }

.cr-move-badge { position: absolute; top: 12px; right: 12px;
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px;
  background: rgba(253, 251, 245, 0.92); backdrop-filter: blur(8px);
  border: 0.5px solid; border-radius: 8px; font-size: 11.5px; font-weight: 600;
  box-shadow: var(--shadow-md); }
.cr-badge-glyph { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 12px; }

/* ─── Right panel ───────────────────────────────────────────── */
.cr-right { display: flex; flex-direction: column; gap: 16px; }
.cr-source { padding-bottom: 14px; }

.cr-tabs { display: flex; gap: 2px; padding: 3px; margin: 0 16px; background: var(--bg-2);
  border-radius: 8px; }
.cr-tab { flex: 1; padding: 6px 10px; border: 0; background: transparent; border-radius: 6px;
  font-size: 11.5px; font-weight: 500; color: var(--ink-3); }
.cr-tab.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
.cr-tab:hover:not(.on) { color: var(--ink); }
.cr-tab-body { padding: 12px 16px 0; }
.cr-help { font-size: 11.5px; color: var(--ink-3); margin: 0 0 8px; }
.cr-input-row { display: flex; gap: 6px; }
.cr-input { flex: 1; height: 32px; padding: 0 10px; border-radius: 7px;
  border: 0.5px solid var(--line-2); background: var(--bg-2);
  font: 12.5px 'Inter', sans-serif; color: var(--ink); outline: none; transition: all .15s; }
.cr-input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-soft); }
.cr-textarea { width: 100%; padding: 10px; border-radius: 7px; border: 0.5px solid var(--line-2);
  background: var(--bg-2); font: 11px 'JetBrains Mono', monospace; color: var(--ink-2); outline: none; resize: vertical; }
.cr-textarea:focus { border-color: var(--accent); background: var(--surface); }
.cr-btn-secondary { height: 32px; padding: 0 12px; border-radius: 7px;
  border: 0.5px solid var(--line-2); background: var(--surface); color: var(--ink-2);
  font-size: 12px; font-weight: 500; }
.cr-btn-secondary:hover { background: var(--bg-2); }
.cr-drop { padding: 24px; border: 1px dashed var(--line-2); border-radius: 8px;
  text-align: center; font-size: 12px; color: var(--ink-3); background: var(--bg-2); }
.cr-drop span { font-size: 11px; color: var(--ink-4); }

.cr-recent-list { display: flex; flex-direction: column; margin-top: 10px; gap: 1px;
  background: var(--line); border-radius: 8px; overflow: hidden; }
.cr-recent { display: grid; grid-template-columns: 24px 1fr auto; gap: 10px; align-items: center;
  padding: 8px 10px; border: 0; background: var(--bg-2); text-align: left; transition: all .15s; }
.cr-recent:hover { background: var(--surface); }
.cr-recent.active { background: var(--surface); box-shadow: inset 3px 0 0 var(--accent); }
.cr-recent-result { width: 22px; height: 22px; border-radius: 5px; color: #fdfbf5;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
.cr-recent-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.cr-recent-opp { font-size: 12px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cr-recent-rt { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-3); margin-left: 4px; font-weight: 400; }
.cr-recent-open { font-size: 10.5px; color: var(--ink-3); }
.cr-recent-date { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-4); }

.cr-depth-row { display: flex; align-items: center; gap: 10px; padding: 14px 16px 8px; }
.cr-depth-label { font-size: 11.5px; color: var(--ink-3); font-weight: 500; }
.cr-range { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
  background: var(--bg-2); outline: none; }
.cr-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--accent); border: 2px solid var(--surface); cursor: pointer; box-shadow: var(--shadow-sm); }
.cr-range::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--accent);
  border: 2px solid var(--surface); cursor: pointer; }
.cr-depth-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--ink);
  min-width: 18px; text-align: right; }

.cr-btn-primary { display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 32px); margin: 0 16px; height: 38px; border-radius: 9px;
  border: 0; background: linear-gradient(180deg, #2a2418 0%, #1d1a14 100%); color: #fdfbf5;
  font-size: 13px; font-weight: 600; letter-spacing: 0.005em;
  box-shadow: inset 0 1px 0 rgba(255, 220, 150, 0.12), 0 1px 2px rgba(0, 0, 0, 0.16); transition: all .15s; }
.cr-btn-primary:hover { background: linear-gradient(180deg, #3c3527 0%, #2a2418 100%); }
.cr-btn-primary svg { color: #d8b56a; }

/* Accuracy */
.cr-accuracy { padding-bottom: 12px; }
.cr-acc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
.cr-accbar { padding: 10px 12px; border-radius: 9px; border: 0.5px solid var(--line);
  background: var(--bg-2); }
.cr-accbar.b { background: #2a2418; color: #f5f1e8; }
.cr-accbar.b .cr-accbar-label, .cr-accbar.b .cr-accbar-name { color: rgba(245, 241, 232, 0.6); }
.cr-accbar.b .cr-accbar-track { background: rgba(245, 241, 232, 0.15); }
.cr-accbar-head { display: flex; justify-content: space-between; align-items: baseline; }
.cr-accbar-label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; color: var(--ink-3); }
.cr-accbar-score { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; }
.cr-accbar-name { font-size: 11px; margin-top: 2px; color: var(--ink-3); }
.cr-accbar-track { height: 4px; border-radius: 2px; background: rgba(60, 50, 35, 0.10); margin-top: 8px; overflow: hidden; }
.cr-accbar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #d8b56a); border-radius: 2px; transition: width .3s; }

.cr-acc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px;
  margin: 12px 16px 0; background: var(--line); border-radius: 8px; overflow: hidden; }
.cr-acc-cell { display: flex; align-items: center; gap: 6px; padding: 7px 9px;
  background: var(--surface); }
.cr-acc-glyph { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
  width: 18px; height: 18px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; }
.cr-acc-name { flex: 1; font-size: 10.5px; color: var(--ink-2); }
.cr-acc-counts { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-2); font-weight: 500; }
.cr-acc-sep { color: var(--ink-4); margin: 0 2px; }

/* Engine lines */
.cr-lines { padding-bottom: 6px; }
.cr-engine-line { display: grid; grid-template-columns: 22px 50px 1fr; gap: 8px; align-items: center;
  padding: 8px 16px; border-top: 0.5px solid var(--line); }
.cr-engine-line:first-of-type { border-top: 0; }
.cr-eline-rank { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-4);
  background: var(--bg-2); width: 18px; height: 18px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center; font-weight: 600; }
.cr-eline-eval { font-size: 12px; font-weight: 600; color: var(--ink); }
.cr-eline-pv { display: flex; gap: 8px; flex-wrap: wrap; font-size: 11.5px; color: var(--ink-2); }
.cr-eline-mv { white-space: nowrap; }

/* Coach */
.cr-commentary { padding-bottom: 14px; }
.cr-coach { display: flex; gap: 12px; padding: 0 16px; }
.cr-coach-icon { flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(180deg, #2a2418, #1d1a14); color: #d8b56a;
  display: flex; align-items: center; justify-content: center; }
